spring:
  application:
    name: govedu-assist-platform

  # Koneksi Database
  datasource:
    url: jdbc:postgresql://localhost:5432/govedu_db
    username: govuser
    password: govpassword
    driver-class-name: org.postgresql.Driver

  # Konfigurasi JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update # Ganti ke 'validate' di production
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Konfigurasi Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: govedu-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

  # Konfigurasi Spring Batch
  batch:
    jdbc:
      initialize-schema: always # Auto-create tabel meta-data Spring Batch

# Konfigurasi Dukcapil API
dukcapil:
  api:
    base-url: https://mock-dukcapil.internal.govedu/api/v1
    client-id: govedu-assist-client
    client-secret: mock-secret-key
    timeout: 30000 # 30 seconds

# Konfigurasi Bank Himbara H2H
bank:
  himbara:
    base-url: https://api.himbara.co.id/snap/v1
    client-id: GOVEDU_ASSIST_01
    client-secret: change-in-production-secret-key
    partner-id: GOVEDU_ASSIST_01
    channel-id: 95051
    source-account-number: change-in-production-source-account
    timeout: 30000 # 30 seconds

# Konfigurasi SFTP untuk Reconciliation
sftp:
  host: sftp.himbara.co.id
  port: 22
  username: govedu_user
  password: change-in-production
  remote-inbound-dir: /inbound
  remote-archive-dir: /archive

# Konfigurasi S3
s3:
  bucket-name: govedu-assist-bucket
  region: ap-southeast-1

# Konfigurasi API Bansos Eksternal
bansos:
  api:
    base-url: https://mock-dtks.kemensos.go.id/api/v1
    api-key: change-in-production-secret-key

# Konfigurasi JWT
jwt:
  secret: govedu-secret-key-change-in-production-min-256-bits
  expiration: 3600000 # 1 hour in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

server:
  port: 8080